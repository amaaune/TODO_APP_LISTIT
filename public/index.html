<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>ListIt</h1>
    <p id="api-status">Statut API: ⏳ Vérification...</p>
  </header>

  <main>
    <section id="add-todo">
      <input type="text" id="todo-input" placeholder="Ajouter une tâche...">
      <button id="add-btn">Ajouter</button>
    </section>

    <!-- Ajoute entre #add-todo et #todos-list -->
    <section id="templates-bar">
      <button id="save-template-btn">💾 Sauvegarder comme modèle</button>
      <select id="templates-select">
        <option value="">📂 Charger un modèle...</option>
      </select>
      <button id="delete-template-btn">🗑️ Supprimer le modèle</button>
    </section>

    <section id="todos-list">
      <h2>Mes Tâches</h2>
      <ul id="tasks"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 ListIt App</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
